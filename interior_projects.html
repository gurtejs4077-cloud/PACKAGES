<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Aesthetica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="background-audio.css">
    <script src="background-audio.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #faf9f6;
            --text: #1a1a1a;
            --accent: #c2a389;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.05);
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; cursor: none; }
        #cursor { position: fixed; width: 8px; height: 8px; background: var(--text); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
        #cursor-ring { position: fixed; width: 40px; height: 40px; border: 1px solid var(--text); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: transform 0.15s ease-out; opacity: 0.2; }
        
        nav {
            position: fixed; top: 0; width: 100%; padding: 40px 60px; display: flex; justify-content: space-between; align-items: center; z-index: 100; background: rgba(250, 249, 246, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; letter-spacing: 1px; text-decoration: none; color: var(--text); }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 400; }

        .sub-header { padding: 180px 0 60px; text-align: center; }
        .sub-header h1 { font-family: 'Playfair Display', serif; font-size: 4rem; font-weight: 400; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        
        .project-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-bottom: 100px; }
        .project-item { position: relative; overflow: hidden; }
        .project-item img { width: 100%; aspect-ratio: 16/10; object-fit: cover; transition: 0.8s; }
        .project-item:hover img { transform: scale(1.05); }
        .project-info { margin-top: 20px; }
        .project-info h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 400; }
        .project-info span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #888; }

        footer { padding: 60px 0; border-top: 1px solid var(--border); text-align: center; color: #888; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 4px; }
    </style>

    
    

    <style id="mobile-excellence-fix">
        @media (max-width: 768px) {
            nav { padding: 0 20px !important; height: 80px !important; justify-content: space-between !important; display: flex !important; align-items: center !important; }
            .logo, .nav-logo { font-size: 1.1rem !important; flex-grow: 1; }
            .nav-links {
                display: none;
                position: fixed;
                top: 80px;
                left: 0;
                right: 0;
                background: rgba(6, 11, 22, 0.98);
                padding: 2rem;
                flex-direction: column;
                gap: 1.5rem;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                z-index: 1000;
                height: auto;
                text-align: center;
            }
            .nav-links.open { display: flex !important; }
            .hamburger { display: flex !important; flex-direction: column; gap: 5px; cursor: pointer; z-index: 1001; order: 3; margin-left: 15px; }
            .hamburger span { width: 25px; height: 2px; background: #c9a84c; transition: 0.3s; }
            nav .btn-gold, nav .btn-primary, nav .nav-cta, nav .nav-cta-mobile { display: none !important; }
            h1 { font-size: clamp(2.2rem, 10vw, 3.5rem) !important; line-height: 1.2 !important; }
            h2 { font-size: clamp(1.8rem, 8vw, 2.5rem) !important; }
            .container { padding: 120px 20px 60px !important; grid-template-columns: 1fr !important; gap: 40px !important; }
            .about-grid, .contact-grid, .expertise-grid, .pricing-grid, .academics-grid, .footer-grid, .numbers-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
            .hero-title { font-size: clamp(2.5rem, 12vw, 4rem) !important; }
            .hero-content { padding: 0 20px !important; }
            .sub-hero { height: 50vh !important; }
            .hero-stats { display: none !important; }
            .academic-card, .exp-card, .p-card, .niche-card { padding: 30px 20px !important; }
            #cursor, #cursor-ring { display: none !important; }
            body { cursor: default !important; }
        }
    </style>
    
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <nav>
        <a href="INTERIORBASIC.html" class="logo">AESTHETICA<span>.</span></a>
        <div class="nav-links">
            <a href="interior_about.html">Studio</a>
            <a href="interior_projects.html">Projects</a>
            <a href="INTERIORBASIC.html#pricing">Packages</a>
            <a href="interior_contact.html">Contact</a>
        </div>
        <div class="hamburger" id="hamburger" onclick="document.querySelector(\'.nav-links\').classList.toggle(\'open\')"><span></span><span></span><span></span></div>
        
    </nav>

    <header class="sub-header">
        <div class="container">
            <h1>Selected <span>Works</span></h1>
        </div>
    </header>

    <div class="container">
        <div class="project-grid">
            <div class="project-item">
                <img src="https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=800&q=80" alt="Project">
                <div class="project-info">
                    <span>2024 • Residential</span>
                    <h3>The Minimalist Penthouse</h3>
                </div>
            </div>
            <div class="project-item">
                <img src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?w=800&q=80" alt="Project">
                <div class="project-info">
                    <span>2023 • Office</span>
                    <h3>Lumina Creative Collective</h3>
                </div>
            </div>
            <div class="project-item">
                <img src="https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?w=800&q=80" alt="Project">
                <div class="project-info">
                    <span>2023 • Retail</span>
                    <h3>Avenue Concept Store</h3>
                </div>
            </div>
            <div class="project-item">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800&q=80" alt="Project">
                <div class="project-info">
                    <span>2022 • Villa</span>
                    <h3>The Sandstone Retreat</h3>
                </div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Aesthetica Studio. Designed by Gurtej Singh.
    </footer>

    <script>
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursor-ring');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            ring.style.left = e.clientX + 'px';
            ring.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
