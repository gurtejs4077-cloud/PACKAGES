<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Trainers — Iron Forge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="background-audio.css">
    <script src="background-audio.js" defer></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #050505;
            --crimson: #e63946;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            cursor: none;
        }
        #cursor { position: fixed; width: 8px; height: 8px; background: var(--crimson); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: transform .1s; }
        #cursor-ring { position: fixed; width: 35px; height: 35px; border: 1px solid rgba(230, 57, 70, 0.5); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: transform .15s ease-out; }
        
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 20px 60px;
            background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-logo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.5rem; color: var(--white); text-decoration: none; }
        .nav-logo span { color: var(--crimson); }
        .nav-links { display: flex; gap: 35px; list-style: none; }
        .nav-links a { color: #888; text-decoration: none; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .nav-links a:hover { color: var(--white); }

        .sub-header {
            padding: 180px 0 100px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(230, 57, 70, 0.1), transparent);
        }
        .sub-header h1 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 4rem; text-transform: uppercase; }
        
        .content-section { padding: 80px 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        
        .trainer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
        .trainer-card { position: relative; overflow: hidden; border: 1px solid var(--glass-border); }
        .trainer-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; filter: grayscale(1); transition: 0.5s; }
        .trainer-card:hover .trainer-img { filter: grayscale(0); transform: scale(1.05); }
        .trainer-info { padding: 30px; background: rgba(0,0,0,0.8); position: absolute; bottom: 0; left: 0; right: 0; transform: translateY(20px); transition: 0.5s; opacity: 0; }
        .trainer-card:hover .trainer-info { transform: translateY(0); opacity: 1; }
        .trainer-info h3 { font-family: 'Montserrat'; font-size: 1.5rem; color: var(--crimson); text-transform: uppercase; }
        .trainer-info span { color: #888; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }

        footer { padding: 60px 0; border-top: 1px solid var(--glass-border); text-align: center; color: #555; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>

    
    

    <style id="mobile-excellence-fix">
        @media (max-width: 768px) {
            nav { padding: 0 20px !important; height: 80px !important; justify-content: space-between !important; display: flex !important; align-items: center !important; }
            .logo, .nav-logo { font-size: 1.1rem !important; flex-grow: 1; }
            .nav-links {
                display: none;
                position: fixed;
                top: 80px;
                left: 0;
                right: 0;
                background: rgba(6, 11, 22, 0.98);
                padding: 2rem;
                flex-direction: column;
                gap: 1.5rem;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                z-index: 1000;
                height: auto;
                text-align: center;
            }
            .nav-links.open { display: flex !important; }
            .hamburger { display: flex !important; flex-direction: column; gap: 5px; cursor: pointer; z-index: 1001; order: 3; margin-left: 15px; }
            .hamburger span { width: 25px; height: 2px; background: #c9a84c; transition: 0.3s; }
            nav .btn-gold, nav .btn-primary, nav .nav-cta, nav .nav-cta-mobile { display: none !important; }
            h1 { font-size: clamp(2.2rem, 10vw, 3.5rem) !important; line-height: 1.2 !important; }
            h2 { font-size: clamp(1.8rem, 8vw, 2.5rem) !important; }
            .container { padding: 120px 20px 60px !important; grid-template-columns: 1fr !important; gap: 40px !important; }
            .about-grid, .contact-grid, .expertise-grid, .pricing-grid, .academics-grid, .footer-grid, .numbers-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
            .hero-title { font-size: clamp(2.5rem, 12vw, 4rem) !important; }
            .hero-content { padding: 0 20px !important; }
            .sub-hero { height: 50vh !important; }
            .hero-stats { display: none !important; }
            .academic-card, .exp-card, .p-card, .niche-card { padding: 30px 20px !important; }
            #cursor, #cursor-ring { display: none !important; }
            body { cursor: default !important; }
        }
    </style>
    
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <nav>
        <a href="GYMBASIC.html" class="nav-logo">IRON<span>FORGE.</span></a>
        <ul class="nav-links">
            <li><a href="gym_about.html">About</a></li>
            <li><a href="gym_classes.html">Classes</a></li>
            <li><a href="gym_trainers.html">Trainers</a></li>
            <li><a href="GYMBASIC.html#bmi">BMI Calc</a></li>
            <li><a href="gym_contact.html">Contact</a></li>
        </ul>
        <div class="hamburger" id="hamburger" onclick="document.getElementById(\'navLinks\').classList.toggle(\'open\')"><span></span><span></span><span></span></div>
        
    </nav>

    <header class="sub-header">
        <div class="container">
            <h1>The <span>Masters</span></h1>
        </div>
    </header>

    <section class="content-section">
        <div class="container">
            <div class="trainer-grid">
                <div class="trainer-card">
                    <img src="https://images.unsplash.com/photo-1567013127542-490d757e51fe?w=600&q=80" alt="Trainer" class="trainer-img">
                    <div class="trainer-info">
                        <h3>Marcus Vane</h3>
                        <span>Head Strength Coach</span>
                    </div>
                </div>
                <div class="trainer-card">
                    <img src="https://images.unsplash.com/photo-1548690312-3027b40d6bc9?w=600&q=80" alt="Trainer" class="trainer-img">
                    <div class="trainer-info">
                        <h3>Sarah Stone</h3>
                        <span>HIIT & Conditioning</span>
                    </div>
                </div>
                <div class="trainer-card">
                    <img src="https://images.unsplash.com/photo-1594381898411-846e7d193883?w=600&q=80" alt="Trainer" class="trainer-img">
                    <div class="trainer-info">
                        <h3>Leo Drake</h3>
                        <span>Yoga & Mobility</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 Iron Forge. Designed by Gurtej Singh.
    </footer>

    <script>
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursor-ring');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            ring.style.left = e.clientX + 'px';
            ring.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
