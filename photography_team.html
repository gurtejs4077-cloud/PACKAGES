<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Team — Lumière Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="background-audio.css">
    <script src="background-audio.js" defer></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --black: #080808; --gold: #c9a96e; --ivory: #f5f0e8; --mist: #a89880; }
        body { background-color: var(--black); color: var(--ivory); font-family: 'DM Sans', sans-serif; overflow-x: hidden; cursor: none; }
        #cursor { position: fixed; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); mix-blend-mode: difference; }
        #cursor-ring { position: fixed; width: 40px; height: 40px; border: 1px solid var(--gold); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: transform .15s ease-out; opacity: .5; }
        
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 24px 60px; display: flex; align-items: center; justify-content: space-between; background: rgba(8, 8, 8, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: .2em; color: var(--gold); text-decoration: none; }
        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a { color: var(--mist); text-decoration: none; font-size: .75rem; letter-spacing: .18em; text-transform: uppercase; }
        .nav-links a:hover { color: var(--gold); }

        .sub-header { padding: 180px 0 100px; text-align: center; }
        .sub-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 5rem; font-weight: 300; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        .team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-bottom: 100px; }
        .team-card { position: relative; overflow: hidden; aspect-ratio: 3/4; }
        .team-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.8s; }
        .team-card:hover img { filter: grayscale(0); transform: scale(1.05); }
        .team-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); transform: translateY(20px); opacity: 0; transition: 0.5s; }
        .team-card:hover .team-info { transform: translateY(0); opacity: 1; }
        .team-info h3 { font-family: 'Cormorant Garamond'; font-size: 1.8rem; color: var(--white); }
        .team-info span { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }

        footer { padding: 60px 0; border-top: 1px solid rgba(255, 255, 255, 0.05); text-align: center; color: var(--mist); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <nav>
        <a href="PHOTOGRAPHYBASIC.html" class="nav-logo">LUMIÈRE</a>
        <ul class="nav-links">
            <li><a href="photography_portfolio.html">Portfolio</a></li>
            <li><a href="photography_team.html">Team</a></li>
            <li><a href="photography_services.html">Services</a></li>
            <li><a href="photography_booking.html">Booking</a></li>
            <li><a href="photography_contact.html">Contact</a></li>
        </ul>
    </nav>

    <header class="sub-header">
        <div class="container">
            <h1>The <span>Artists</span></h1>
        </div>
    </header>

    <div class="container">
        <div class="team-grid">
            <div class="team-card">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=600&q=80">
                <div class="team-info">
                    <h3>Elena Rossi</h3>
                    <span>Lead Portraitist</span>
                </div>
            </div>
            <div class="team-card">
                <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=600&q=80">
                <div class="team-info">
                    <h3>Marco Sterling</h3>
                    <span>Fashion Specialist</span>
                </div>
            </div>
            <div class="team-card">
                <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&q=80">
                <div class="team-info">
                    <h3>Leo Vane</h3>
                    <span>Technical Director</span>
                </div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Lumiere Studio. Designed by Gurtej Singh.
    </footer>

    <script>
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursor-ring');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            ring.style.left = e.clientX + 'px';
            ring.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
